<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1f0d;font-family:'DM Mono',monospace;}

#hud{position:fixed;top:0;left:0;right:0;height:48px;z-index:300;
  background:rgba(6,12,6,.96);border-bottom:1px solid #1a3a1a;
  display:flex;align-items:center;backdrop-filter:blur(8px);}
#backBtn{display:flex;align-items:center;gap:6px;padding:0 16px;height:100%;
  color:#4a8a30;font-size:9px;letter-spacing:2px;text-transform:uppercase;
  text-decoration:none;border-right:1px solid #1a2a1a;transition:all .15s;}
#backBtn:hover{color:#8acc50;background:rgba(74,138,48,.08);}
#hudTitle{padding:0 16px;border-right:1px solid #1a2a1a;
  font-family:'Playfair Display',serif;font-style:italic;color:#c8bea0;font-size:16px;}
#hudMeta{display:flex;flex:1;}
.hm{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 14px;border-right:1px solid #1a2a1a;min-width:58px;height:100%;}
.hm-v{font-size:15px;color:#c9924a;font-family:'Playfair Display',serif;font-style:italic;line-height:1;}
.hm-l{font-size:6px;color:#2a5a1a;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
#hudR{display:flex;align-items:center;gap:5px;padding:0 10px;margin-left:auto;}
.hbtn{padding:4px 10px;font-size:8px;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;border:1px solid #1e3a1a;background:rgba(30,58,26,.5);color:#4a7a30;transition:all .12s;}
.hbtn:hover{border-color:#4a8a30;color:#7acc40;}
.hbtn.on{border-color:#c9924a;color:#c9924a;background:rgba(201,146,74,.1);}

#gc{position:fixed;top:48px;left:0;right:0;bottom:110px;display:block;
  cursor:grab;touch-action:none;}
#gc.lifting{cursor:grabbing;}

/* tray */
#tray{position:fixed;bottom:0;left:0;right:0;height:110px;z-index:300;
  background:rgba(4,10,4,.97);border-top:1px solid #1a3a1a;}
#trayTop{display:flex;align-items:center;justify-content:space-between;
  padding:5px 14px 3px;border-bottom:1px solid #0e1e0e;}
#trayLbl{font-size:7px;color:#2a4a1a;letter-spacing:2px;text-transform:uppercase;}
#trayHint{font-size:7px;color:#1a2a1a;letter-spacing:1px;transition:color .3s;}
#trayHint.active{color:#c9924a;}
#trayRow{display:flex;gap:6px;padding:7px 12px;overflow-x:auto;overflow-y:hidden;
  height:82px;align-items:center;
  scrollbar-width:thin;scrollbar-color:#1a3a1a transparent;}
#trayRow::-webkit-scrollbar{height:3px;}
#trayRow::-webkit-scrollbar-thumb{background:#1a3a1a;}
.tslot{flex-shrink:0;width:68px;height:66px;background:#060e06;border:1px solid #182818;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  cursor:default;position:relative;transition:all .12s;}
.tslot.has-building{cursor:grab;border-color:#2a4a1a;}
.tslot.has-building:hover{border-color:#4a8a30;background:#0a120a;}
.tslot.active-drag{border-color:#c9924a !important;background:#100a02 !important;
  box-shadow:0 0 12px rgba(201,146,74,.3);}
.tslot-em{font-size:22px;line-height:1;pointer-events:none;}
.tslot-name{font-size:6px;color:#3a6a2a;letter-spacing:.3px;text-align:center;
  pointer-events:none;padding:0 2px;line-height:1.3;text-transform:uppercase;}
.tslot-lvl{font-size:7px;color:#6a4820;pointer-events:none;
  font-family:'Playfair Display',serif;font-style:italic;}
.tslot-pips{display:flex;gap:2px;pointer-events:none;}
.tslot-pips span{width:5px;height:2px;background:#141e14;}
.tslot-pips span.on{background:#c9924a;}
.tslot.in-world::after{content:'📍';position:absolute;top:2px;right:3px;font-size:8px;opacity:.6;}
.tslot.locked{opacity:.25;filter:grayscale(1);}

/* ghost */
#ghost{position:fixed;pointer-events:none;z-index:999;display:none;
  transform:translate(-50%,-60%);font-size:0;}

/* info panel */
#panel{position:fixed;right:0;top:48px;width:220px;max-height:calc(100vh - 48px - 110px);
  overflow-y:auto;background:rgba(4,10,4,.97);border-left:1px solid #1a3a1a;
  z-index:200;padding:15px;transform:translateX(100%);

#panel.open{transform:translateX(0);}
#panelClose{position:absolute;top:9px;right:11px;background:none;border:none;
  color:#2a4a1a;font-size:15px;cursor:pointer;}
#panelClose:hover{color:#7acc40;}
#pEmoji{font-size:34px;display:block;margin-bottom:5px;}
#pName{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:#c8bea0;margin-bottom:2px;}
#pLvl{font-size:7px;color:#c9924a;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
#pDesc{font-size:11px;color:#4a6a3a;line-height:1.7;margin-bottom:8px;
  font-family:'Playfair Display',serif;font-style:italic;}
.pbar-bg{width:100%;height:3px;background:#0a140a;margin-bottom:2px;}
.pbar-fill{height:100%;transition:width .9s cubic-bezier(.16,1,.3,1);}
.pbar-txt{font-size:7px;color:#2a4a1a;letter-spacing:.5px;margin-bottom:10px;}
.pstages{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.pst{display:flex;align-items:center;gap:6px;padding:4px 6px;
  border:1px solid #0a140a;font-size:7px;letter-spacing:.3px;}
.pst.done{border-color:#162816;}
.pst.cur{border-color:#c9924a;background:#0e0a02;}
.pst-n{color:#2a4a1a;width:20px;flex-shrink:0;}
.pst.done .pst-n{color:#3a6a2a;}
.pst.cur .pst-n{color:#c9924a;}
.pst-lbl{color:#3a5a2a;flex:1;line-height:1.3;}
.pst.cur .pst-lbl{color:#c8bea0;}
.ptips{border-top:1px solid #0a140a;padding-top:8px;}
.ptips-lbl{font-size:6px;color:#1a3a1a;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.ptip{font-size:10px;color:#3a5a2a;line-height:1.6;padding:3px 0;
  border-bottom:1px solid #080e08;font-family:'Playfair Display',serif;font-style:italic;}
.ptip:last-child{border:none;}

/* tooltip */
#ttip{position:fixed;z-index:400;pointer-events:none;display:none;
  background:#040a04;border:1px solid #2a5a1a;color:#7acc40;
  font-size:8px;letter-spacing:1px;padding:4px 9px;white-space:nowrap;}

@media(max-width:500px){
  #hudTitle{display:none;}
  .hm{padding:0 8px;min-width:44px;}
  #panel{width:100%;max-height:50vh;top:auto;bottom:110px;
    transform:translateY(100%);border:none;border-top:1px solid #1a3a1a;}
  #panel.open{transform:translateY(0);}
}
</style>
</head>

// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
function loadHabitData(){
  for(const k of Object.keys(localStorage)){
    if(k.startsWith('hc_')){
      try{const d=JSON.parse(localStorage.getItem(k));if(d&&Array.isArray(d.habits))return d;}catch(e){}
    }
  }
  return null;
}
function matchDef(habit){
  const t=(habit.name+' '+(habit.emoji||'')).toLowerCase();
  let best=null,bs=0;
  for(const d of DEFS){const s=d.keys.reduce((a,k)=>a+(t.includes(k)?1:0),0);if(s>bs){bs=s;best=d;}}
  return bs>0?best:null;
}
function calcProgress(habit,wd){
  const days=Object.keys(wd||{}).sort();
  let comp=0,sched=0;
  for(const d of days){
    const w=wd[d];if(!w)continue;
    const [y,m,day]=d.split('-').map(Number);
    const dow=new Date(y,m-1,day,12).getDay();
    if((habit.days||[0,1,2,3,4,5,6]).includes(dow)){sched++;if(w.total>0&&w.done>0)comp+=w.done/w.total;}
  }
  if(habit.done)comp+=1;
  if(sched===0)return habit.done?15:0;
  return Math.min(100,Math.round(comp/Math.max(sched,1)*100));
}
function getLevel(prog,def){let l=def.levels[0];for(const x of def.levels)if(prog>=x.min)l=x;return l;}
function getLvIdx(prog,def){let i=0;def.levels.forEach((x,j)=>{if(prog>=x.min)i=j;});return i;}
function calcStreak(habits,wd){
  const now=new Date();let s=0;let dt=new Date(now);
  for(let i=0;i<365;i++){
    const ds=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    const w=wd[ds];
    if(!w||w.total===0){dt.setDate(dt.getDate()-1);if(i===0)continue;break;}
    if(w.done>0)s++;else break;
    dt.setDate(dt.getDate()-1);
  }
  return s;
}

// ═══════════════════════════════════════════════
// FIXED PLOT LAYOUT
// These are the designated spots where buildings can be placed.
// Arranged as a charming town layout.
// ═══════════════════════════════════════════════
const TILE=80;
// isometric projection helpers
const ISO_W=TILE, ISO_H=TILE*0.5;
// world is in "grid" coords (col, row); screen conversion below
// We define plots as {col, row} in a grid

const PLOTS=[
  // Town square ring (8 plots around center)
  {col:0,row:0},  {col:1,row:0},  {col:2,row:0},  {col:3,row:0},
  {col:0,row:1},                                   {col:3,row:1},
  {col:0,row:2},                                   {col:3,row:2},
  {col:0,row:3},  {col:1,row:3},  {col:2,row:3},  {col:3,row:3},
  // Outer ring
  {col:-1,row:-1},{col:1,row:-1},{col:3,row:-1},{col:5,row:-1},
  {col:-1,row:4}, {col:1,row: 4},{col:3,row: 4},{col:5,row: 4},
  {col:-1,row:1}, {col:-1,row:2},
  {col: 5,row:1}, {col:5, row:2},
];
// Only first 8 (or however many buildings) are used as actual building plots
// Remaining are decorative/empty

const SAVE_KEY='hw_iso_v1';

// World state: each plot can hold a building or be empty
// plots: [{col,row, defId|null}]
let plotState=[]; // [{col, row, defId}]  — which def is on which plot
let buildingData=[]; // [{def, progress}] — all buildings regardless of placement
let dragging=null; // {defId, fromPlot (index|null = tray), startX, startY}
let dropPlot=null; // plot index being hovered during drag

// ═══════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════
const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');
let CW=0,CH=0;
let camX=0,camY=0;
let showGrid=true;
let panning=false,panSX=0,panSY=0,panCX=0,panCY=0;
let clickStart={x:0,y:0};
let lastTime=0;
let animFrame=0;

function resize(){
  CW=gc.width=window.innerWidth;
  CH=gc.height=window.innerHeight-48-110;
  centerCam();render();
}

// Isometric grid-to-screen
// Standard isometric: x goes right+down, y goes left+down
function isoToScreen(col,row){
  const sx=(col-row)*ISO_W/2+camX+CW/2;
  const sy=(col+row)*ISO_H/2+camY+CH*0.3;
  return{sx,sy};
}
function screenToIso(sx,sy){
  const x=(sx-camX-CW/2)/ISO_W*2;
  const y=(sy-camY-CH*0.3)/ISO_H*2;
  const col=(x+y)/2;
  const row=(y-x)/2;
  return{col:Math.round(col),row:Math.round(row)};
}

function centerCam(){camX=0;camY=0;}

// ═══════════════════════════════════════════════
// COLOUR HELPERS
// ═══════════════════════════════════════════════
function lerpColor(a,b,t){
  const ah=a.replace('#','');const bh=b.replace('#','');
  const ar=parseInt(ah.slice(0,2),16),ag=parseInt(ah.slice(2,4),16),ab=parseInt(ah.slice(4,6),16);
  const br=parseInt(bh.slice(0,2),16),bg=parseInt(bh.slice(2,4),16),bb=parseInt(bh.slice(4,6),16);
  const rr=Math.round(ar+(br-ar)*t),rg=Math.round(ag+(bg-ag)*t),rb=Math.round(ab+(bb-ab)*t);
  return'#'+rr.toString(16).padStart(2,'0')+rg.toString(16).padStart(2,'0')+rb.toString(16).padStart(2,'0');
}
function brighten(hex,a){
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+a);
  const g=Math.min(255,parseInt(hex.slice(3,5),16)+a);
  const b=Math.min(255,parseInt(hex.slice(5,7),16)+a);
  return'#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

// ═══════════════════════════════════════════════
// ISOMETRIC TILE HELPERS
// ═══════════════════════════════════════════════
function drawIsoTile(sx,sy,w,h,top,left,right,depth){
  // top face (diamond)
  ctx.fillStyle=top;
  ctx.beginPath();
  ctx.moveTo(sx,       sy);
  ctx.lineTo(sx+w/2,   sy-h/2);
  ctx.lineTo(sx+w,     sy);
  ctx.lineTo(sx+w/2,   sy+h/2);
  ctx.closePath();ctx.fill();
  // left face
  ctx.fillStyle=left;
  ctx.beginPath();
  ctx.moveTo(sx,       sy);
  ctx.lineTo(sx+w/2,   sy+h/2);
  ctx.lineTo(sx+w/2,   sy+h/2+depth);
  ctx.lineTo(sx,       sy+depth);
  ctx.closePath();ctx.fill();
  // right face
  ctx.fillStyle=right;
  ctx.beginPath();
  ctx.moveTo(sx+w,     sy);
  ctx.lineTo(sx+w/2,   sy+h/2);
  ctx.lineTo(sx+w/2,   sy+h/2+depth);
  ctx.lineTo(sx+w,     sy+depth);
  ctx.closePath();ctx.fill();
}

function drawIsoBox(sx,sy,bw,bd,bh,faceColor,sideColor,topColor){
  // bw=width, bd=depth(y), bh=height in z
  // Front-left face
  ctx.fillStyle=sideColor;
  ctx.beginPath();
  ctx.moveTo(sx,        sy);
  ctx.lineTo(sx,        sy-bh);
  ctx.lineTo(sx+bw/2,   sy-bh+bd/2);
  ctx.lineTo(sx+bw/2,   sy+bd/2);
  ctx.closePath();ctx.fill();
  // Front-right face
  ctx.fillStyle=faceColor;
  ctx.beginPath();
  ctx.moveTo(sx+bw/2,   sy+bd/2);
  ctx.lineTo(sx+bw/2,   sy-bh+bd/2);
  ctx.lineTo(sx+bw,     sy-bh);
  ctx.lineTo(sx+bw,     sy);
  ctx.closePath();ctx.fill();
  // Top face
  ctx.fillStyle=topColor;
  ctx.beginPath();
  ctx.moveTo(sx,        sy-bh);
  ctx.lineTo(sx+bw/2,   sy-bh-bd/2);
  ctx.lineTo(sx+bw,     sy-bh);
  ctx.lineTo(sx+bw/2,   sy-bh+bd/2);
  ctx.closePath();ctx.fill();
}

// ═══════════════════════════════════════════════
// GROUND + ENVIRONMENT RENDERING
// ═══════════════════════════════════════════════
const GRASS_COLS=['#2d4a1e','#2a451c','#314d21','#283f19','#354e24'];
const ROAD_TOP='#2e2820',ROAD_LEFT='#221e14',ROAD_RIGHT='#1a1810';

function isPlotTile(col,row){return PLOTS.some(p=>p.col===col&&p.row===row);}
function isRoadTile(col,row){
  // roads run along col=-0.5 lines and row=-0.5 lines between plots
  return false; // roads are drawn separately as paths
}

// Day/night cycle
function getDayProgress(){
  const h=new Date().getHours(),m=new Date().getMinutes();
  return(h*60+m)/(24*60);// 0=midnight,0.5=noon
}
function getSkyColor(){
  const t=getDayProgress();
  if(t<0.25)return lerpColor('#0a0e1a','#1a2a4a',t/0.25);
  if(t<0.33)return lerpColor('#1a2a4a','#f4a460',((t-0.25)/0.08));
  if(t<0.5) return lerpColor('#f4a460','#aed6f1',((t-0.33)/0.17));
  if(t<0.7) return '#aed6f1';
  if(t<0.79)return lerpColor('#aed6f1','#f4a460',(t-0.7)/0.09);
  if(t<0.88)return lerpColor('#f4a460','#1a1030',(t-0.79)/0.09);
  return '#0a0e1a';
}
function getGroundLight(){
  const t=getDayProgress();
  if(t<0.25||t>0.88) return 0.4;
  if(t<0.33) return 0.4+0.6*(t-0.25)/0.08;
  if(t<0.79) return 1.0;
  return 1.0-0.6*(t-0.79)/0.09;
}

// Animated entities
const PEOPLE=Array.from({length:6},(_,i)=>({
  col:((i*3.7)%6)-1, row:((i*2.3)%6)-1,
  dx:(Math.random()-.5)*.008, dy:(Math.random()-.5)*.008,
  color:['#c9924a','#7ba7c4','#8aab8e','#e8a598','#c47060','#9a8d7a'][i],
  phase:i*1.1,
}));
const CLOUDS=Array.from({length:4},(_,i)=>({
  x:CW*.1+i*CW*.25, y:CH*.1+i*CH*.05,
  spd:.15+i*.08, r:30+i*18, alpha:.12+i*.04,
}));
const BIRDS=Array.from({length:3},(_,i)=>({
  x:Math.random()*800, y:50+i*30, spd:1+i*.5, phase:i*2.1,
}));

// Smoke particles
const SMOKE=[];
function addSmoke(sx,sy){if(SMOKE.length<60)SMOKE.push({x:sx,y:sy,vx:(Math.random()-.5)*.4,vy:-0.6-Math.random()*.4,life:1,r:3+Math.random()*4});}

function renderEnvironment(now){
  const dt=now-lastTime; lastTime=now;
  const gl=getGroundLight();
  const hour=new Date().getHours();
  const isNight=hour<6||hour>=20;

  // Sky
  ctx.fillStyle=getSkyColor();ctx.fillRect(0,0,CW,CH);

  // Stars at night
  if(isNight){
    const t=now*.0003;
    ctx.fillStyle='rgba(255,255,255,.8)';
    for(let i=0;i<40;i++){
      const sx2=(Math.sin(i*127.1)*0.5+0.5)*CW;
      const sy2=(Math.sin(i*311.7)*0.5+0.5)*CH*.5;
      const twinkle=0.3+0.7*Math.abs(Math.sin(t+i*.7));
      ctx.globalAlpha=twinkle*.7;
      ctx.fillRect(sx2,sy2,1.5,1.5);
    }
    ctx.globalAlpha=1;
  }

  // Sun or moon
  if(!isNight){
    const progress=(hour-6)/14;
    const sunX=CW*(0.1+progress*.8);
    const sunY=CH*(0.18-Math.sin(progress*Math.PI)*.12);
    const g=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,28);
    const sunC=hour<17?'#ffd54f':'#ff7043';
    g.addColorStop(0,sunC);g.addColorStop(.6,hexAlpha(sunC,.4));g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(sunX,sunY,28,0,Math.PI*2);ctx.fill();
  }

  // Clouds
  for(const c of CLOUDS){
    c.x+=c.spd*.3;if(c.x>CW+c.r*3)c.x=-c.r*3;
    ctx.fillStyle=`rgba(255,255,255,${c.alpha*(isNight?.3:1)})`;
    ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(c.x+c.r*.7,c.y+c.r*.1,c.r*.7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(c.x-c.r*.6,c.y+c.r*.15,c.r*.55,0,Math.PI*2);ctx.fill();
  }

  // Birds
  if(!isNight){
    for(const b of BIRDS){
      b.x+=b.spd;if(b.x>CW+20)b.x=-20;
      const wing=Math.sin(now*.006*b.spd+b.phase)*6;
      ctx.strokeStyle='rgba(40,30,20,.5)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(b.x-6,b.y+wing);ctx.lineTo(b.x,b.y);ctx.lineTo(b.x+6,b.y+wing);ctx.stroke();
    }
  }

  // Iso ground tiles
  const range=10;
  const cx0=Math.floor(-camX/(ISO_W/2))-range;
  const cx1=cx0+range*2+Math.ceil(CW/(ISO_W/2))+range;

  // Sort tiles by row+col for painter's algorithm
  const tiles=[];
  for(let sum=cx0;sum<cx1;sum++){
    for(let col=Math.floor(sum/2)-1;col<=Math.ceil(sum/2)+1;col++){
      const row=sum-col;
      tiles.push({col,row});
    }
  }

  for(const{col,row}of tiles){
    const{sx,sy}=isoToScreen(col,row);
    if(sx<-ISO_W||sx>CW+ISO_W||sy<-ISO_H*2||sy>CH+ISO_H) continue;

    const isPlot=isPlotTile(col,row);
    const plotIdx=PLOTS.findIndex(p=>p.col===col&&p.row===row);

    const baseColor=isPlot?'#3a5a28':GRASS_COLS[(col*7+row*13+14)%GRASS_COLS.length];
    const tint=gl;
    const tc=isPlot?'#4a6a30':'#3a5220';
    const lc=isPlot?'#2a4a1e':'#283d16';
    const rc=isPlot?'#222e16':'#1e3010';

    // Ground tile (flat iso rhombus with slight depth)
    drawIsoTile(sx-ISO_W/2,sy,ISO_W,ISO_H,tc,lc,rc,4);

    // Plot marker glow
    if(isPlot){
      const pd=plotIdx!=-1?plotState.find(p=>p.plotIdx===plotIdx):null;
      const isEmpty=!pd?.defId;
      if(isEmpty){
        // Dashed outline on empty plots
        ctx.strokeStyle=dropPlot===plotIdx?'rgba(201,146,74,.7)':'rgba(100,180,60,.25)';
        ctx.lineWidth=1;ctx.setLineDash([3,4]);
        ctx.beginPath();
        ctx.moveTo(sx-ISO_W/2,sy);
        ctx.lineTo(sx,sy-ISO_H/2);
        ctx.lineTo(sx+ISO_W/2,sy);
        ctx.lineTo(sx,sy+ISO_H/2);
        ctx.closePath();ctx.stroke();
        ctx.setLineDash([]);
        if(dropPlot===plotIdx){
          ctx.fillStyle='rgba(201,146,74,.12)';
          ctx.beginPath();
          ctx.moveTo(sx-ISO_W/2,sy);ctx.lineTo(sx,sy-ISO_H/2);
          ctx.lineTo(sx+ISO_W/2,sy);ctx.lineTo(sx,sy+ISO_H/2);
          ctx.closePath();ctx.fill();
        }
      }
    }

    // Decorative grass tufts on non-plot tiles
    const fi=(col*41+row*37+100)%100;
    if(fi<7&&!isPlot){
      const tx2=sx-3+(fi%3)*4;const ty2=sy-2;
      ctx.strokeStyle='rgba(70,120,40,.6)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(tx2,ty2);ctx.lineTo(tx2-2,ty2-5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(tx2+3,ty2);ctx.lineTo(tx2+4,ty2-4);ctx.stroke();
    }
  }
}

// ═══════════════════════════════════════════════
// 3D ISOMETRIC BUILDINGS
// ═══════════════════════════════════════════════
function drawBuilding(b,sx,sy,isBeingDragged,isHovered){
  const prog=b.progress/100;
  if(prog<=0&&!isBeingDragged) return; // don't draw empty buildings
  const def=b.def;
  const lv=getLvIdx(b.progress,def);
  const T=ISO_W; // base tile width
  const H=ISO_H; // base tile height (top face)
  // Building sits centered on the iso tile
  const bx=sx; // center-x of tile
  const by=sy; // center-y of tile

  // Scale with progress
  const scale=Math.max(0.25,prog);
  const bldH=T*.5*scale; // building wall height in iso z

  ctx.save();
  ctx.globalAlpha=isBeingDragged?.5:1;

  // Hover highlight
  if(isHovered&&!isBeingDragged){
    ctx.shadowColor=def.color;ctx.shadowBlur=16;
  }

  switch(def.id){
    case 'gym':     drawIsoGym(bx,by,scale,lv,def,T,H,bldH); break;
    case 'library': drawIsoLibrary(bx,by,scale,lv,def,T,H,bldH); break;
    case 'temple':  drawIsoTemple(bx,by,scale,lv,def,T,H,bldH); break;
    case 'kitchen': drawIsoKitchen(bx,by,scale,lv,def,T,H,bldH); break;
    case 'studio':  drawIsoStudio(bx,by,scale,lv,def,T,H,bldH); break;
    case 'lab':     drawIsoLab(bx,by,scale,lv,def,T,H,bldH); break;
    case 'inn':     drawIsoInn(bx,by,scale,lv,def,T,H,bldH); break;
    case 'park':    drawIsoPark(bx,by,scale,lv,def,T,H); break;
  }

  ctx.shadowBlur=0;
  ctx.globalAlpha=1;

  // Name label
  ctx.fillStyle='rgba(0,0,0,.65)';
  const lw=def.name.length*5.5+8;
  ctx.fillRect(bx-lw/2,by+H/2+4,lw,11);
  ctx.fillStyle=b.progress>0?def.color:'#3a5a2a';
  ctx.font='500 6.5px DM Mono';ctx.textAlign='center';
  ctx.fillText(def.name.toUpperCase(),bx,by+H/2+12);
  ctx.textAlign='left';

  ctx.restore();
}

function isoBox(cx,cy,W,D,Ht,top,face,side){
  // cx,cy = center bottom of box
  // W=iso width, D=iso depth, Ht=height
  const x=cx-W/2, y=cy;
  // Left face
  ctx.fillStyle=side;
  ctx.beginPath();
  ctx.moveTo(x,       y);
  ctx.lineTo(x,       y-Ht);
  ctx.lineTo(x+W/2,   y-Ht+D/2);
  ctx.lineTo(x+W/2,   y+D/2);
  ctx.closePath();ctx.fill();
  // Right face
  ctx.fillStyle=face;
  ctx.beginPath();
  ctx.moveTo(x+W/2,   y+D/2);
  ctx.lineTo(x+W/2,   y-Ht+D/2);
  ctx.lineTo(x+W,     y-Ht);
  ctx.lineTo(x+W,     y);
  ctx.closePath();ctx.fill();
  // Top face
  ctx.fillStyle=top;
  ctx.beginPath();
  ctx.moveTo(x,       y-Ht);
  ctx.lineTo(x+W/2,   y-Ht-D/2);
  ctx.lineTo(x+W,     y-Ht);
  ctx.lineTo(x+W/2,   y-Ht+D/2);
  ctx.closePath();ctx.fill();
}

function isoWindow(cx,cy,W,D,Ht,lit){
  // small iso window on face
  ctx.fillStyle=lit?'rgba(255,230,120,.8)':'rgba(100,120,140,.3)';
  ctx.beginPath();
  ctx.moveTo(cx,cy);ctx.lineTo(cx+W/2,cy+D/2);
  ctx.lineTo(cx+W/2,cy+D/2-Ht);ctx.lineTo(cx,cy-Ht);
  ctx.closePath();ctx.fill();
}

function isoRoof(cx,cy,W,D,pH,col){
  // pitched iso roof: two triangular faces + ridge
  // left face
  ctx.fillStyle=brighten(col,-20);
  ctx.beginPath();
  ctx.moveTo(cx-W/2,  cy);
  ctx.lineTo(cx,      cy-D/2);
  ctx.lineTo(cx,      cy-D/2-pH);
  ctx.lineTo(cx-W/2,  cy-pH);
  ctx.closePath();ctx.fill();
  // right face
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(cx+W/2,  cy);
  ctx.lineTo(cx,      cy-D/2);
  ctx.lineTo(cx,      cy-D/2-pH);
  ctx.lineTo(cx+W/2,  cy-pH);
  ctx.closePath();ctx.fill();
  // top edge
  ctx.strokeStyle=brighten(col,20);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-W/2,cy-pH);ctx.lineTo(cx,cy-D/2-pH);ctx.lineTo(cx+W/2,cy-pH);ctx.stroke();
}

// Individual building draw functions
function drawIsoGym(cx,cy,sc,lv,def,T,H,bH){
  const W=T*.75*sc,D=H*.75*sc;
  const top=def.roofColor,face=def.color,side=def.sideColor;
  isoBox(cx,cy,W,D,bH,top,face,side);
  // Windows on face (right side)
  const nw=Math.min(lv+1,3);
  for(let i=0;i<nw;i++){
    const wx=cx+W*.05+i*(W*.25);
    const wy=cy-bH*.35;
    isoWindow(wx,wy,W*.18,D*.18,bH*.25,true);
  }
  // Roof parapet
  ctx.fillStyle=brighten(top,15);
  ctx.beginPath();
  ctx.moveTo(cx-W/2,cy-bH);ctx.lineTo(cx,cy-bH-D/2);
  ctx.lineTo(cx+W,cy-bH);ctx.lineTo(cx+W/2,cy-bH+D/2);
  ctx.closePath();ctx.stroke();
  // Flag at level 3+
  if(lv>=3){
    ctx.strokeStyle=brighten(def.color,30);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx+W*.1,cy-bH);ctx.lineTo(cx+W*.1,cy-bH-T*.3*sc);ctx.stroke();
    ctx.fillStyle='#ffd54f';
    ctx.beginPath();ctx.moveTo(cx+W*.1,cy-bH-T*.3*sc);ctx.lineTo(cx+W*.32*sc,cy-bH-T*.22*sc);ctx.lineTo(cx+W*.1,cy-bH-T*.14*sc);ctx.closePath();ctx.fill();
  }
}

function drawIsoLibrary(cx,cy,sc,lv,def,T,H,bH){
  const W=T*.8*sc,D=H*.8*sc;
  isoBox(cx,cy,W,D,bH,def.roofColor,def.color,def.sideColor);
  // Columns on both faces
  if(lv>=1){
    ctx.fillStyle=brighten(def.sideColor,10);
    for(let i=0;i<3;i++){
      const colX=cx-W/2+i*(W*.24);
      ctx.fillRect(colX,cy-bH,3,bH);
    }
  }
  // Triangular pediment on top
  ctx.fillStyle=brighten(def.roofColor,10);
  ctx.beginPath();
  ctx.moveTo(cx-W/2,cy-bH);
  ctx.lineTo(cx,cy-bH-D*.7);
  ctx.lineTo(cx+W/2,cy-bH);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle=brighten(def.roofColor,30);ctx.lineWidth=1;ctx.stroke();
  // Arched windows
  if(lv>=1){
    const nw=Math.min(lv,3);
    ctx.fillStyle='rgba(200,230,255,.4)';
    for(let i=0;i<nw;i++){
      const wx=cx+W*.05+i*W*.26;
      const wy=cy-bH*.5;
      isoWindow(wx,wy,W*.18,D*.18,bH*.32,false);
    }
  }
}

function drawIsoTemple(cx,cy,sc,lv,def,T,H,bH){
  const tiers=lv+1;
  let baseY=cy;
  for(let t=0;t<tiers;t++){
    const tw=T*(0.78-t*.14)*sc;
    const td=H*(0.78-t*.14)*sc;
    const th=bH/(tiers+.5)*(1+t*.05);
    isoBox(cx,baseY,tw,td,th,
      t%2===0?def.roofColor:brighten(def.roofColor,-15),
      t%2===0?def.color:brighten(def.color,-15),
      t%2===0?def.sideColor:brighten(def.sideColor,-15));
    baseY-=th;
  }
  // Spire
  const spH=T*.3*sc;
  ctx.fillStyle='#c9924a';
  ctx.beginPath();
  ctx.moveTo(cx-T*.06*sc,baseY);
  ctx.lineTo(cx,baseY-spH);
  ctx.lineTo(cx+T*.06*sc,baseY);
  ctx.closePath();ctx.fill();
  // Glow at high levels
  if(lv>=3){
    const g=ctx.createRadialGradient(cx,baseY-spH*.5,0,cx,baseY-spH*.5,T*.3);
    g.addColorStop(0,hexAlpha(def.color,.3));g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,baseY-spH*.5,T*.3,0,Math.PI*2);ctx.fill();
  }
}

function drawIsoKitchen(cx,cy,sc,lv,def,T,H,bH){
  const W=T*.7*sc,D=H*.7*sc;
  isoBox(cx,cy,W,D,bH,def.roofColor,def.color,def.sideColor);
  // Pitched roof
  isoRoof(cx,cy-bH,W,D,bH*.4,def.roofColor);
  // Chimney
  if(lv>=1){
    const chW=W*.2,chD=D*.2,chH=bH*.6;
    isoBox(cx+W*.15,cy-bH-bH*.3,chW,chD,chH,brighten(def.roofColor,-20),brighten(def.sideColor,10),def.sideColor);
    // Smoke puffs
    if(lv>=2){
      const t=performance.now()*.001;
      for(let i=0;i<3;i++){
        const age=(t*0.5+i*.33)%1;
        ctx.fillStyle=`rgba(180,175,165,${0.25*(1-age)})`;
        ctx.beginPath();ctx.arc(cx+W*.2+Math.sin(age*3)*4,cy-bH-chH-age*18,3+age*6,0,Math.PI*2);ctx.fill();
      }
    }
  }
  // Awning
  ctx.fillStyle=brighten(def.color,-15);
  ctx.beginPath();
  ctx.moveTo(cx-W*.55,cy-bH*.35);ctx.lineTo(cx,cy-bH*.45);
  ctx.lineTo(cx+W*.55,cy-bH*.35);ctx.lineTo(cx+W*.55,cy-bH*.3);
  ctx.lineTo(cx,cy-bH*.4);ctx.lineTo(cx-W*.55,cy-bH*.3);
  ctx.closePath();ctx.fill();
}

function drawIsoStudio(cx,cy,sc,lv,def,T,H,bH){
  const W=T*.72*sc,D=H*.72*sc;
  isoBox(cx,cy,W,D,bH,def.roofColor,def.color,def.sideColor);
  // Flat roof parapet
  ctx.strokeStyle=brighten(def.roofColor,20);ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(cx-W/2,cy-bH);ctx.lineTo(cx,cy-bH-D/2);
  ctx.lineTo(cx+W/2,cy-bH);ctx.lineTo(cx,cy-bH+D/2);
  ctx.closePath();ctx.stroke();
  // Big skylight window on face
  if(lv>=1){
    ctx.fillStyle='rgba(200,230,255,.5)';
    ctx.beginPath();
    ctx.moveTo(cx+W*.08,cy-bH*.8);
    ctx.lineTo(cx+W*.42,cy-bH*.8+D*.17);
    ctx.lineTo(cx+W*.42,cy-bH*.25+D*.17);
    ctx.lineTo(cx+W*.08,cy-bH*.25);
    ctx.closePath();ctx.fill();
    // Window pane lines
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(cx+W*.25,cy-bH*.8+D*.085);ctx.lineTo(cx+W*.25,cy-bH*.25+D*.085);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+W*.08,cy-bH*.525);ctx.lineTo(cx+W*.42,cy-bH*.525+D*.17);ctx.stroke();
  }
  // Color blobs at base (level 3+)
  if(lv>=3){
    ['#c9924a','#8aab8e','#7ba7c4','#e8a598'].forEach((c,i)=>{
      ctx.fillStyle=c;
      ctx.beginPath();ctx.arc(cx-W*.3+i*W*.2,cy+D*.2,T*.04,0,Math.PI*2);ctx.fill();
    });
  }
}

function drawIsoLab(cx,cy,sc,lv,def,T,H,bH){
  const W=T*.74*sc,D=H*.74*sc;
  isoBox(cx,cy,W,D,bH,def.roofColor,def.color,def.sideColor);
  // Heavy parapet
  ctx.fillStyle=brighten(def.roofColor,-10);
  const pw=W*.1,pd=D*.1;
  isoBox(cx,cy-bH,W+pw,D+pd,bH*.08,brighten(def.roofColor,5),def.roofColor,brighten(def.roofColor,-15));
  // Antenna array
  if(lv>=2){
    ctx.strokeStyle=brighten(def.color,40);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx,cy-bH-bH*.08);ctx.lineTo(cx,cy-bH-T*.35*sc);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-T*.16*sc,cy-bH-T*.2*sc);ctx.lineTo(cx+T*.16*sc,cy-bH-T*.2*sc);ctx.stroke();
    // Blinking light
    const blink=Math.sin(performance.now()*.003)>.3;
    if(blink){ctx.fillStyle='#ff4040';ctx.beginPath();ctx.arc(cx,cy-bH-T*.35*sc,2.5,0,Math.PI*2);ctx.fill();}
  }
  // Blue-lit windows grid
  if(lv>=1){
    const rows2=Math.min(lv,3);
    for(let r=0;r<rows2;r++){
      for(let c=0;c<2;c++){
        const lit=Math.sin(performance.now()*.001+r+c)>.2;
        isoWindow(cx+W*.05+c*W*.35,cy-bH*.25-r*bH*.3,W*.26,D*.26,bH*.2,lit);
      }
    }
  }
}

function drawIsoInn(cx,cy,sc,lv,def,T,H,bH){
  const W=T*.76*sc,D=H*.76*sc;
  isoBox(cx,cy,W,D,bH,def.roofColor,def.color,def.sideColor);
  // Gabled pitched roof
  isoRoof(cx,cy-bH,W*1.06,D*1.06,bH*.55,def.roofColor);
  // Warm windows
  if(lv>=1){
    const glow=0.5+0.5*Math.sin(performance.now()*.0008);
    ctx.fillStyle=`rgba(255,200,80,${0.4+glow*.25})`;
    isoWindow(cx+W*.08,cy-bH*.45,W*.22,D*.22,bH*.28,true);
    if(lv>=2) isoWindow(cx-W*.1,cy-bH*.5,W*.22,D*.22,bH*.28,true);
  }
  // Hanging sign
  if(lv>=2){
    ctx.fillStyle=brighten(def.sideColor,-10);
    ctx.fillRect(cx+W*.05,cy-bH*.75,W*.32,bH*.12);
    ctx.fillStyle=brighten(def.color,20);
    ctx.font='5px DM Mono';ctx.textAlign='center';
    ctx.fillText('INN',cx+W*.21,cy-bH*.66);ctx.textAlign='left';
  }
}

function drawIsoPark(cx,cy,sc,lv,def,T,H){
  // Ground patch
  ctx.fillStyle=def.color;
  const gx=cx-T*.35*sc,gy=cy;
  ctx.beginPath();
  ctx.moveTo(gx,gy);ctx.lineTo(gx+T*.7*sc,gy-H*.35*sc);
  ctx.lineTo(gx+T*1.4*sc,gy);ctx.lineTo(gx+T*.7*sc,gy+H*.35*sc);
  ctx.closePath();ctx.fill();

  // Trees
  const treeDefs=[[0,.3],[-.25,.1],[.25,.05],[-.1,.5],[.1,.45]];
  const count=Math.min(treeDefs.length,1+lv);
  for(let i=0;i<count;i++){
    const[tx2,ty2]=treeDefs[i];
    const tx=cx+tx2*T*sc;
    const ty=cy+ty2*H*sc-H*.2*sc;
    const ts=T*.14*sc*(0.8+lv*.06);
    const treeH=ts*2.2;
    // Trunk (iso box)
    isoBox(tx,ty,ts*.5,ts*.25,treeH*.35,brighten(def.sideColor,-20),brighten(def.sideColor,10),def.sideColor);
    // Canopy layers
    const canopyCol=brighten(def.color,i*5);
    isoBox(tx,ty-treeH*.35,ts*1.5,ts*.75,treeH*.45,brighten(canopyCol,15),canopyCol,brighten(canopyCol,-20));
    if(lv>=2) isoBox(tx,ty-treeH*.8,ts*1.0,ts*.5,treeH*.35,brighten(canopyCol,25),brighten(canopyCol,10),brighten(canopyCol,-10));
  }
  // Bench
  if(lv>=2){
    ctx.fillStyle='#5a3a1a';
    ctx.fillRect(cx-T*.28*sc,cy+H*.15*sc,T*.22*sc,3);
  }
  // Flowers
  if(lv>=3){
    ['#e8a598','#c9924a','#7ba7c4'].forEach((c,i)=>{
      ctx.fillStyle=c;
      ctx.beginPath();ctx.arc(cx+T*(-.15+i*.15)*sc,cy+H*.3*sc,T*.04*sc,0,Math.PI*2);ctx.fill();
    });
  }
  // Fountain
  if(lv>=4){
    ctx.fillStyle='rgba(100,160,255,.4)';
    ctx.beginPath();ctx.arc(cx,cy,T*.12*sc,0,Math.PI*2);ctx.fill();
    const spurt=Math.abs(Math.sin(performance.now()*.003));
    ctx.fillStyle=`rgba(180,220,255,${.3+spurt*.3})`;
    ctx.beginPath();ctx.arc(cx,cy-T*.08*sc*spurt,T*.025*sc,0,Math.PI*2);ctx.fill();
  }
}

// ═══════════════════════════════════════════════
// PEOPLE + SMOKE ANIMATION
// ═══════════════════════════════════════════════
function renderPeople(){
  const now=performance.now()*.001;
  for(const p of PEOPLE){
    p.col+=p.dx*(1+Math.sin(now+p.phase)*.3);
    p.row+=p.dy*(1+Math.cos(now*1.1+p.phase)*.3);
    // Bounce off edges
    if(Math.abs(p.col)>5){p.dx*=-1;}
    if(Math.abs(p.row)>5){p.dy*=-1;}
    const{sx,sy}=isoToScreen(p.col,p.row);
    if(sx<0||sx>CW||sy<0||sy>CH) continue;
    const bob=Math.sin(now*3+p.phase)*1.5;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(sx,sy+2,4,2,0,0,Math.PI*2);ctx.fill();
    // Body
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(sx,sy-6+bob,3.5,0,Math.PI*2);ctx.fill();
    // Head
    ctx.fillStyle='#c8a878';ctx.beginPath();ctx.arc(sx,sy-11+bob,2.5,0,Math.PI*2);ctx.fill();
    // Legs walking
    const step=Math.sin(now*4+p.phase);
    ctx.strokeStyle=p.color;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(sx,sy-4+bob);ctx.lineTo(sx-2+step*2,sy+bob);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,sy-4+bob);ctx.lineTo(sx+2-step*2,sy+bob);ctx.stroke();
  }
}

// ═══════════════════════════════════════════════
// MAIN RENDER LOOP
// ═══════════════════════════════════════════════
let hoveredPlot=null;

function render(now=performance.now()){
  ctx.clearRect(0,0,CW,CH);
  renderEnvironment(now);

  // Sort plots by iso depth for painter's algorithm
  const sortedPlots=[...PLOTS].map((p,i)=>({...p,idx:i})).sort((a,b)=>(a.col+a.row)-(b.col+b.row));

  for(const plot of sortedPlots){
    const ps=plotState.find(s=>s.plotIdx===plot.idx);
    if(!ps?.defId) continue;
    const bData=buildingData.find(b=>b.def.id===ps.defId);
    if(!bData) continue;
    const{sx,sy}=isoToScreen(plot.col,plot.row);
    const isHov=hoveredPlot===plot.idx;
    const isDragged=dragging?.fromPlot===plot.idx;
    drawBuilding(bData,sx,sy,isDragged,isHov&&!dragging);
  }

  renderPeople();

  // Drag ghost on map
  if(dragging&&dragX!==null){
    const bData=buildingData.find(b=>b.def.id===dragging.defId);
    if(bData&&bData.progress>0){
      const{sx,sy}=isoToScreen(dragIsoCol,dragIsoRow);
      drawBuilding(bData,sx,sy,true,false);
    }
  }

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════
// DRAG SYSTEM
// ═══════════════════════════════════════════════
let dragX=null,dragY=null,dragIsoCol=0,dragIsoRow=0;

function startDrag(defId,fromPlot,ex,ey){
  dragging={defId,fromPlot};
  dragX=ex;dragY=ey;
  gc.classList.add('lifting');
  document.getElementById('trayHint').classList.add('active');
  document.getElementById('trayHint').textContent='Drop on a highlighted plot';
  // Highlight tray item
  document.querySelectorAll('.tslot').forEach(el=>{
    el.classList.toggle('active-drag',el.dataset.defId===defId);
  });
  updateDropTarget(ex,ey);
}

function updateDropTarget(ex,ey){
  // Convert screen to iso, find nearest plot
  const{col,row}=screenToIso(ex,ey-48);
  dragIsoCol=col;dragIsoRow=row;
  // Find closest plot
  let best=null,bestD=Infinity;
  for(let i=0;i<PLOTS.length;i++){
    const p=PLOTS[i];
    const d=Math.abs(p.col-col)+Math.abs(p.row-row);
    if(d<bestD){bestD=d;best=i;}
  }
  dropPlot=bestD<=1.5?best:null;
}

function endDrag(ex,ey){
  if(!dragging) return;
  updateDropTarget(ex,ey);
  if(dropPlot!==null){
    const existingAtDrop=plotState.find(s=>s.plotIdx===dropPlot);
    const existingBuilding=plotState.find(s=>s.defId===dragging.defId);

    if(existingAtDrop&&existingAtDrop.defId!==dragging.defId){
      // Swap: put the displaced building into the old slot
      if(existingBuilding){
        existingBuilding.plotIdx=dropPlot;
        existingAtDrop.plotIdx=existingBuilding.plotIdx;
        // Actually do the swap properly
        const fromIdx=existingBuilding.plotIdx;
        existingBuilding.plotIdx=existingAtDrop.plotIdx;
        existingAtDrop.plotIdx=fromIdx;
        // Redo: simpler
        const aIdx=dragging.fromPlot;
        const bIdx=dropPlot;
        const aState=plotState.find(s=>s.plotIdx===aIdx);
        const bState=plotState.find(s=>s.plotIdx===bIdx);
        if(aState&&bState){[aState.plotIdx,bState.plotIdx]=[bIdx,aIdx];}
        else if(aState){aState.plotIdx=bIdx;}
      } else {
        // Coming from tray, push displaced to tray (remove from plotState)
        existingAtDrop.plotIdx=null;
        plotState=plotState.filter(s=>s!==existingAtDrop);
        plotState.push({plotIdx:dropPlot,defId:dragging.defId});
      }
    } else if(!existingAtDrop){
      // Empty slot
      if(existingBuilding){
        existingBuilding.plotIdx=dropPlot;
      } else {
        plotState.push({plotIdx:dropPlot,defId:dragging.defId});
      }
    }
    saveLayout();
  }
  stopDrag();
}

function stopDrag(){
  dragging=null;dragX=null;dragY=null;dropPlot=null;
  gc.classList.remove('lifting');
  document.getElementById('trayHint').classList.remove('active');
  document.getElementById('trayHint').textContent='Pick up from map or tray';
  document.querySelectorAll('.tslot').forEach(el=>el.classList.remove('active-drag'));
  buildTray();
}

// ═══════════════════════════════════════════════
// CANVAS POINTER EVENTS
// ═══════════════════════════════════════════════
let clickSX=0,clickSY=0;

gc.addEventListener('pointerdown',e=>{
  e.preventDefault();
  clickSX=e.clientX;clickSY=e.clientY;
  const{col,row}=screenToIso(e.clientX,e.clientY-48);
  // Check if clicking on a placed building
  let best=null,bestD=Infinity;
  for(let i=0;i<PLOTS.length;i++){
    const p=PLOTS[i];
    const d=Math.abs(p.col-col)+Math.abs(p.row-row);
    if(d<bestD){bestD=d;best=i;}
  }
  if(bestD<=1.2){
    const ps=plotState.find(s=>s.plotIdx===best);
    if(ps?.defId){
      startDrag(ps.defId,best,e.clientX,e.clientY-48);
      gc.setPointerCapture(e.pointerId);
      return;
    }
  }
  // Otherwise pan
  panning=true;
  panSX=e.clientX;panSY=e.clientY;panCX=camX;panCY=camY;
  gc.setPointerCapture(e.pointerId);
});

gc.addEventListener('pointermove',e=>{
  if(dragging){
    dragX=e.clientX;dragY=e.clientY-48;
    updateDropTarget(e.clientX,e.clientY-48);
    // Hover tray item
    document.querySelectorAll('.tslot').forEach(el=>{
      el.classList.toggle('active-drag',el.dataset.defId===dragging.defId);
    });
    return;
  }
  if(panning){
    camX=panCX+(e.clientX-panSX);
    camY=panCY+(e.clientY-panSY);
    return;
  }
  // Hover detection
  const{col,row}=screenToIso(e.clientX,e.clientY-48);
  let best=null,bestD=Infinity;
  for(let i=0;i<PLOTS.length;i++){
    const p=PLOTS[i];const d=Math.abs(p.col-col)+Math.abs(p.row-row);
    if(d<bestD){bestD=d;best=i;}
  }
  hoveredPlot=bestD<=1?best:null;
  // Tooltip
  const tip=document.getElementById('ttip');
  if(hoveredPlot!==null){
    const ps=plotState.find(s=>s.plotIdx===hoveredPlot);
    if(ps?.defId){
      const bd=buildingData.find(b=>b.def.id===ps.defId);
      if(bd){
        const lv=getLevel(bd.progress,bd.def);
        tip.textContent=bd.def.emoji+' '+bd.def.name+' · '+lv.l+' ('+bd.progress+'%)';
        tip.style.display='block';
        tip.style.left=(e.clientX+12)+'px';
        tip.style.top=(e.clientY-28)+'px';
      }
    } else {tip.style.display='none';}
  } else {tip.style.display='none';}
});

gc.addEventListener('pointerup',e=>{
  if(dragging){endDrag(e.clientX,e.clientY-48);return;}
  panning=false;
  const dx=Math.abs(e.clientX-clickSX),dy=Math.abs(e.clientY-clickSY);
  if(dx<7&&dy<7){
    const{col,row}=screenToIso(e.clientX,e.clientY-48);
    let best=null,bestD=Infinity;
    for(let i=0;i<PLOTS.length;i++){
      const p=PLOTS[i];const d=Math.abs(p.col-col)+Math.abs(p.row-row);
      if(d<bestD){bestD=d;best=i;}
    }
    if(bestD<=1.2){
      const ps=plotState.find(s=>s.plotIdx===best);
      if(ps?.defId){
        const bd=buildingData.find(b=>b.def.id===ps.defId);
        if(bd) openPanel(bd);
      }
    }
  }
});

gc.addEventListener('mouseleave',()=>{
  document.getElementById('ttip').style.display='none';
  hoveredPlot=null;
});

// Touch support
gc.addEventListener('touchstart',e=>{
  if(e.touches.length!==1) return;
  e.preventDefault();
  const t=e.touches[0];
  const{col,row}=screenToIso(t.clientX,t.clientY-48);
  let best=null,bestD=Infinity;
  for(let i=0;i<PLOTS.length;i++){
    const p=PLOTS[i];const d=Math.abs(p.col-col)+Math.abs(p.row-row);
    if(d<bestD){bestD=d;best=i;}
  }
  if(bestD<=1.5){
    const ps=plotState.find(s=>s.plotIdx===best);
    if(ps?.defId){startDrag(ps.defId,best,t.clientX,t.clientY-48);return;}
  }
  panning=true;panSX=t.clientX;panSY=t.clientY;panCX=camX;panCY=camY;
},{passive:false});

gc.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  if(dragging){dragX=t.clientX;dragY=t.clientY-48;updateDropTarget(t.clientX,t.clientY-48);return;}
  if(panning){camX=panCX+(t.clientX-panSX);camY=panCY+(t.clientY-panSY);}
},{passive:false});

gc.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];
  if(dragging){endDrag(t.clientX,t.clientY-48);return;}
  panning=false;
});

// ═══════════════════════════════════════════════
// TRAY
// ═══════════════════════════════════════════════
function buildTray(){
  const row=document.getElementById('trayRow');
  row.innerHTML='';
  for(const def of DEFS){
    const bd=buildingData.find(b=>b.def.id===def.id);
    const prog=bd?bd.progress:0;
    const lv=bd?getLevel(prog,def):null;
    const lvIdx=bd?getLvIdx(prog,def):0;
    const inWorld=plotState.some(s=>s.defId===def.id);
    const locked=!bd;

    const slot=document.createElement('div');
    slot.className='tslot'+(locked?' locked':inWorld?' in-world has-building':prog>0?' has-building':'');
    slot.dataset.defId=def.id;

    const pips=Array.from({length:5},(_,i)=>`<span class="${i<lvIdx?'on':''}"></span>`).join('');
    slot.innerHTML=`<div class="tslot-em">${locked?'🔒':def.emoji}</div>`+
      `<div class="tslot-name">${def.name}</div>`+
      `<div class="tslot-lvl">${locked?'locked':lv?lv.l:'—'}</div>`+
      `<div class="tslot-pips">${pips}</div>`;

    if(!locked){
      slot.addEventListener('mousedown',e=>{
        e.preventDefault();
        startDrag(def.id,null,e.clientX,e.clientY-48);
      });
      slot.addEventListener('touchstart',e=>{
        e.preventDefault();
        const t=e.touches[0];
        startDrag(def.id,null,t.clientX,t.clientY-48);
      },{passive:false});
      slot.addEventListener('click',()=>{
        if(dragging) return;
        const b=buildingData.find(b=>b.def.id===def.id);
        if(b) openPanel(b);
      });
    }
    row.appendChild(slot);
  }
}

// Handle drag from tray ending on canvas
window.addEventListener('mousemove',e=>{
  if(!dragging) return;
  dragX=e.clientX;dragY=e.clientY-48;
  updateDropTarget(e.clientX,e.clientY-48);
  document.querySelectorAll('.tslot').forEach(el=>{
    el.classList.toggle('active-drag',el.dataset.defId===dragging?.defId);
  });
});
window.addEventListener('mouseup',e=>{
  if(dragging) endDrag(e.clientX,e.clientY-48);
});
window.addEventListener('touchend',e=>{
  if(dragging){const t=e.changedTouches[0];endDrag(t.clientX,t.clientY-48);}
});
window.addEventListener('touchmove',e=>{
  if(dragging){const t=e.touches[0];dragX=t.clientX;dragY=t.clientY-48;updateDropTarget(t.clientX,t.clientY-48);}
},{passive:false});

// ═══════════════════════════════════════════════
// INFO PANEL
// ═══════════════════════════════════════════════
function openPanel(bd){
  const def=bd.def,prog=bd.progress;
  const lv=getLevel(prog,def);
  document.getElementById('pEmoji').textContent=def.emoji;
  document.getElementById('pName').textContent=def.name;
  document.getElementById('pLvl').textContent=lv.l+' · '+prog+'%';
  document.getElementById('pDesc').textContent=def.desc||'';
  const fill=document.getElementById('pFill');
  fill.style.background=def.color;fill.style.width='0%';
  setTimeout(()=>fill.style.width=prog+'%',40);
  const nxt=def.levels.find(l=>l.min>prog);
  document.getElementById('pBarTxt').textContent=prog+'% built'+(nxt?' · next: '+nxt.l+' at '+nxt.min+'%':' · max level ✦');
  const stEl=document.getElementById('pStages');stEl.innerHTML='';
  for(const l of def.levels){
    const isCur=lv===l,done=prog>=l.min;
    const d=document.createElement('div');d.className='pst'+(isCur?' cur':done?' done':'');
    d.innerHTML=`<div class="pst-n">${l.min}%</div><div class="pst-lbl">${done&&!isCur?'✓ ':''}${l.l}</div>`;
    stEl.appendChild(d);
  }
  const tEl=document.getElementById('pTips');tEl.innerHTML='<div class="ptips-lbl">Tips</div>';
  (def.tips||[]).forEach(t=>{const d=document.createElement('div');d.className='ptip';d.textContent=t;tEl.appendChild(d);});
  document.getElementById('panel').classList.add('open');
}
document.getElementById('panelClose').addEventListener('click',()=>document.getElementById('panel').classList.remove('open'));

// ═══════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════
function saveLayout(){
  localStorage.setItem(SAVE_KEY,JSON.stringify(plotState));
}
function loadLayout(){
  const raw=localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  try{
    const saved=JSON.parse(raw);
    plotState=saved.filter(s=>s.plotIdx!=null&&buildingData.some(b=>b.def.id===s.defId));
  }catch(e){}
}
function defaultLayout(){
  // Place buildings that have progress on plots
  let pi=0;
  plotState=[];
  for(const bd of buildingData){
    if(bd.progress>0&&pi<PLOTS.length){
      plotState.push({plotIdx:pi,defId:bd.def.id});
      pi++;
    }
  }
}

// ═══════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════
function updateHUD(habits,wd){
  const active=buildingData.filter(b=>b.progress>0);
  document.getElementById('hm1').textContent=active.length;
  document.getElementById('hm2').textContent=calcStreak(habits,wd||{});
  const avg=active.length?Math.round(active.reduce((s,b)=>s+b.progress,0)/active.length):0;
  document.getElementById('hm3').textContent=avg?avg+'%':'—';
}

document.getElementById('btnGrid').addEventListener('click',function(){showGrid=!showGrid;this.classList.toggle('on',showGrid);});
document.getElementById('btnCenter').addEventListener('click',()=>{centerCam();});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  const data=loadHabitData();
  const habits=data?.habits||[];
  const wd=data?.weeklyData||{};

  // Build buildingData
  const seen=new Set();
  buildingData=[];
  for(const h of habits){
    const def=matchDef(h);if(!def) continue;
    if(seen.has(def.id)){
      const ex=buildingData.find(b=>b.def.id===def.id);
      if(ex) ex.progress=Math.min(100,ex.progress+calcProgress(h,wd)*.3);
      continue;
    }
    seen.add(def.id);
    buildingData.push({def,progress:calcProgress(h,wd)});
  }
  for(const def of DEFS){
    if(!seen.has(def.id)) buildingData.push({def,progress:0});
  }
  // Sort by progress desc so active buildings get first plots
  buildingData.sort((a,b)=>b.progress-a.progress);

  loadLayout();
  if(plotState.length===0) defaultLayout();

  updateHUD(habits,wd);
  resize();
  buildTray();
  requestAnimationFrame(render);
}

window.addEventListener('resize',resize);
init();
</script>
